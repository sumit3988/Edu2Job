<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edu2Job Minimal Signup Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "background": "#F9FAFB",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "12px",
                        "lg": "12px",
                        "xl": "12px",
                        "2xl": "12px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background font-display text-gray-900 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-100 p-8">
<div class="text-center mb-8">
<div class="w-12 h-12 rounded-xl bg-primary flex items-center justify-center text-white mx-auto mb-4">
<span class="material-symbols-outlined">auto_awesome</span>
</div>
<h1 class="text-2xl font-bold mb-2">Create an account</h1>
<p class="text-sm text-gray-500">Join Edu2Job to start your journey</p>
</div>
<form class="space-y-5">
<div class="space-y-1">
<label class="text-sm font-medium text-gray-700 block">Full Name</label>
<input class="w-full rounded-xl border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-shadow" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-1">
<label class="text-sm font-medium text-gray-700 block">Email</label>
<input class="w-full rounded-xl border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-shadow" placeholder="name@example.com" type="email"/>
</div>
<div class="space-y-1">
<label class="text-sm font-medium text-gray-700 block">Password</label>
<input class="w-full rounded-xl border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-shadow" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-1">
<label class="text-sm font-medium text-gray-700 block">Confirm Password</label>
<input class="w-full rounded-xl border-gray-200 px-4 py-2.5 focus:ring-2 focus:ring-primary/20 focus:border-primary text-sm transition-shadow" placeholder="••••••••" type="password"/>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-medium py-2.5 rounded-xl transition-colors" type="button">
                    Sign Up
                </button>
</div>
</form>
<div class="mt-8 text-center text-sm text-gray-500">
<p>Already have an account? <a class="text-primary hover:underline font-medium" href="#">Log in</a></p>
</div>
</div>

</body></html>
