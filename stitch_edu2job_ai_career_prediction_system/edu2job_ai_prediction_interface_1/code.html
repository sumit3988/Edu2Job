<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edu2Job Minimal Login Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#4F46E5",
                        "background": "#F9FAFB",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "12px",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background font-sans text-slate-900 min-h-screen flex items-center justify-center p-4">
<div class="bg-white rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.04)] border border-slate-100 w-full max-w-[400px] p-8">
<div class="text-center mb-8">
<div class="size-12 rounded-xl bg-primary flex items-center justify-center text-white mx-auto mb-4">
<span class="material-symbols-outlined text-2xl">auto_awesome</span>
</div>
<h1 class="text-2xl font-bold tracking-tight mb-1">Welcome Back</h1>
<p class="text-sm text-slate-500 font-medium">Log in to Edu2Job</p>
</div>
<form class="space-y-5">
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700" for="email">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors placeholder:text-slate-400 text-slate-900" id="email" placeholder="name@edu2job.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors placeholder:text-slate-400 text-slate-900" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-1">
<div class="flex items-center">
<input class="size-4 text-primary bg-white border-slate-300 rounded focus:ring-primary focus:ring-2" id="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 transition-colors py-2.5 rounded-lg text-white font-semibold text-sm shadow-sm mt-2" type="button">
                Sign in
            </button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-slate-500">
                Don't have an account? 
                <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Sign up</a>
</p>
</div>
</div>

</body></html>
