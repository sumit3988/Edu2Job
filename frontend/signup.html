<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – Edu2Job</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card wide">
      <div class="auth-icon">
        <span class="material-symbols-outlined">auto_awesome</span>
      </div>
      <h1>Create an account</h1>
      <p class="subtitle">Join Edu2Job to start your journey</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="name@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required minlength="6" />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn btn-primary btn-full" style="margin-top: 8px;">Sign Up</button>
      </form>

      <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }
      const data = {
        full_name: document.getElementById('fullName').value.trim(),
        email:     document.getElementById('email').value.trim(),
        password:  password,
      };
      if (!data.full_name || !data.email || !data.password) {
        showToast('All fields are required', 'error'); return;
      }
      if (data.password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
      try {
        const res = await apiPost('/auth/signup', data);
        if (res.user_id) {
          showToast('Account created! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'login.html', 1000);
        } else {
          showToast(res.error || 'Signup failed', 'error');
        }
      } catch (err) { showToast(err.message || 'Network error', 'error'); }
    });
  </script>
</body>
</html>
